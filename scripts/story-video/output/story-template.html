<!DOCTYPE html>
<html>
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 628px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: #000;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background: url('https://tednluwflfhxyucgwigh.supabase.co/storage/v1/object/public/story-images/stories/featured/pdlvi4yay5k-1762323853830.png') center/cover;
    animation: kenburns 12s ease-in-out forwards;
  }

  @keyframes kenburns {
    0% { transform: scale(1.0); }
    100% { transform: scale(1.15); }
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      180deg,
      rgba(0,0,0,0.3) 0%,
      rgba(0,0,0,0.7) 50%,
      rgba(0,0,0,0.85) 100%
    );
  }

  .content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 60px 80px;
    text-align: center;
  }

  .title {
    font-size: 48px;
    font-weight: 900;
    color: white;
    line-height: 1.1;
    margin-bottom: 16px;
    opacity: 0;
    transform: translateY(30px);
    animation: slideUp 0.8s ease-out 1s forwards;
  }

  .subtitle {
    font-size: 28px;
    font-weight: 700;
    color: #E8652E;
    margin-bottom: 24px;
    opacity: 0;
    transform: translateY(20px);
    animation: slideUp 0.8s ease-out 2s forwards;
  }

  .excerpt {
    font-size: 20px;
    color: #ccc;
    max-width: 700px;
    line-height: 1.5;
    opacity: 0;
    transform: translateY(20px);
    animation: slideUp 0.8s ease-out 3s forwards;
  }

  .brand {
    position: absolute;
    bottom: 30px;
    left: 40px;
    font-size: 16px;
    font-weight: 900;
    color: #E8652E;
    letter-spacing: 3px;
    opacity: 0;
    animation: fadeIn 0.6s ease-out 0.5s forwards;
  }

  .cta {
    position: absolute;
    bottom: 32px;
    right: 40px;
    font-size: 15px;
    color: #999;
    opacity: 0;
    animation: fadeIn 0.8s ease-out 5s forwards;
  }

  .accent-line {
    width: 60px;
    height: 3px;
    background: #E8652E;
    margin-bottom: 20px;
    opacity: 0;
    animation: scaleIn 0.6s ease-out 1.8s forwards;
  }

  .countdown {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 22px;
    font-weight: 900;
    color: #E8652E;
    letter-spacing: 3px;
    padding: 12px 32px;
    border: 2px solid #E8652E;
    opacity: 0;
    animation: fadeIn 0.8s ease-out 5s forwards;
  }

  @keyframes slideUp {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    to { opacity: 1; }
  }
  @keyframes scaleIn {
    from { opacity: 0; transform: scaleX(0); }
    to { opacity: 1; transform: scaleX(1); }
  }
</style>
</head>
<body>
  <div class="hero-bg"></div>
  <div class="overlay"></div>
  <div class="content">
    <div class="title">Building Revolution in Shipping Containers</div>
    <div class="accent-line"></div>
    <div class="subtitle">The Story of CONTAINED</div>
    <div class="excerpt">How shipping containers became spaces for justice, healing, and transformation</div>
  </div>
  <div class="countdown">30 DAYS TILL LAUNCH</div>
  <div class="brand">JUSTICEHUB</div>
  <div class="cta">justicehub.com.au/contained</div>
</body>
</html>
