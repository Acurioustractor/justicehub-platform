<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supabase Photo Picker — JusticeHub</title>
<style>
  :root {
    --bg: #0A0A0A;
    --surface: #141414;
    --border: #2a2a2a;
    --text: #e5e5e5;
    --muted: #666;
    --red: #DC2626;
    --green: #059669;
    --offwhite: #F5F0E8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', 'SF Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
  }

  /* Header */
  .header {
    position: sticky; top: 0; z-index: 50;
    background: var(--bg); border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .header h1 { font-size: 14px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; white-space: nowrap; }
  .header .stats { color: var(--muted); font-size: 11px; }

  /* Controls */
  .controls {
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center; flex: 1;
  }
  .controls select, .controls input {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 6px 10px; font-size: 12px; font-family: inherit;
  }
  .controls select { cursor: pointer; }
  .controls input { width: 180px; }
  .controls input::placeholder { color: var(--muted); }

  /* Breadcrumb */
  .breadcrumb {
    padding: 8px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 4px; flex-wrap: wrap;
    font-size: 11px; color: var(--muted);
  }
  .breadcrumb button {
    background: none; border: none; color: var(--green); cursor: pointer;
    font-family: inherit; font-size: 11px; padding: 2px 4px;
  }
  .breadcrumb button:hover { text-decoration: underline; }
  .breadcrumb .sep { color: #333; }

  /* Selection bar */
  .selection-bar {
    position: sticky; top: 48px; z-index: 40;
    background: var(--green); color: white;
    padding: 8px 20px; display: none; align-items: center; gap: 12px;
    font-size: 12px; font-weight: 600;
  }
  .selection-bar.active { display: flex; }
  .selection-bar button {
    background: rgba(255,255,255,0.2); border: none; color: white;
    padding: 4px 12px; cursor: pointer; font-family: inherit; font-size: 11px;
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .selection-bar button:hover { background: rgba(255,255,255,0.3); }
  .selection-bar button.danger { background: rgba(220,38,38,0.6); }
  .selection-bar .spacer { flex: 1; }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 4px;
    padding: 4px;
  }
  .grid.list {
    grid-template-columns: 1fr;
    gap: 2px;
  }

  /* Card */
  .card {
    position: relative; cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.15s, opacity 0.15s;
    overflow: hidden; background: var(--surface);
  }
  .card:hover { border-color: var(--border); }
  .card.selected { border-color: var(--green); }
  .card.selected::after {
    content: '✓'; position: absolute; top: 6px; right: 6px;
    background: var(--green); color: white; width: 22px; height: 22px;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: bold;
  }
  .card img {
    width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block;
    background: #1a1a1a;
  }
  .card .info {
    padding: 6px 8px;
  }
  .card .name {
    font-size: 11px; color: var(--text); white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }
  .card .meta {
    font-size: 10px; color: var(--muted); margin-top: 2px;
  }

  /* Folder card */
  .card.folder {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; border: 1px solid var(--border);
  }
  .card.folder:hover { border-color: var(--green); }
  .card.folder .folder-icon {
    font-size: 24px; flex-shrink: 0;
  }
  .card.folder .folder-name {
    font-size: 12px; font-weight: 600;
  }
  .card.folder .folder-count {
    font-size: 10px; color: var(--muted);
  }

  /* List view card */
  .grid.list .card:not(.folder) {
    display: flex; align-items: center; gap: 12px; padding: 4px 8px;
  }
  .grid.list .card:not(.folder) img {
    width: 60px; height: 45px; aspect-ratio: auto; flex-shrink: 0;
  }

  /* Output panel */
  .output-panel {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 60;
    background: var(--surface); border-top: 2px solid var(--green);
    max-height: 40vh; overflow-y: auto; display: none;
    padding: 16px 20px;
  }
  .output-panel.active { display: block; }
  .output-panel h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
  .output-panel pre {
    background: var(--bg); border: 1px solid var(--border);
    padding: 12px; font-size: 11px; overflow-x: auto;
    white-space: pre-wrap; word-break: break-all;
  }
  .output-panel .formats { display: flex; gap: 8px; margin-bottom: 8px; }
  .output-panel .formats button {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 4px 10px; cursor: pointer; font-family: inherit; font-size: 11px;
  }
  .output-panel .formats button.active { border-color: var(--green); color: var(--green); }

  /* Loading */
  .loading {
    display: flex; align-items: center; justify-content: center;
    padding: 60px; color: var(--muted);
  }
  .loading .spin {
    width: 20px; height: 20px; border: 2px solid var(--border);
    border-top-color: var(--green); border-radius: 50%;
    animation: spin 0.6s linear infinite; margin-right: 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* View toggle */
  .view-toggle button {
    background: var(--surface); border: 1px solid var(--border); color: var(--muted);
    padding: 4px 8px; cursor: pointer; font-size: 14px;
  }
  .view-toggle button.active { color: var(--green); border-color: var(--green); }

  /* Size selector */
  .size-selector button {
    background: var(--surface); border: 1px solid var(--border); color: var(--muted);
    padding: 4px 8px; cursor: pointer; font-size: 10px; text-transform: uppercase;
    font-family: inherit;
  }
  .size-selector button.active { color: var(--green); border-color: var(--green); }
</style>
</head>
<body>

<div class="header">
  <h1>📸 Photo Picker</h1>
  <div class="controls">
    <select id="bucketSelect"></select>
    <input type="text" id="searchInput" placeholder="Filter by name..." />
    <div class="view-toggle">
      <button id="gridView" class="active" title="Grid">⊞</button>
      <button id="listView" title="List">☰</button>
    </div>
    <div class="size-selector">
      <button data-cols="150" class="active">SM</button>
      <button data-cols="200">MD</button>
      <button data-cols="300">LG</button>
    </div>
  </div>
  <div class="stats" id="stats"></div>
</div>

<div class="breadcrumb" id="breadcrumb"></div>

<div class="selection-bar" id="selectionBar">
  <span id="selectionCount">0 selected</span>
  <div class="spacer"></div>
  <button onclick="copySelected('urls')">Copy URLs</button>
  <button onclick="copySelected('json')">Copy JSON</button>
  <button onclick="copySelected('jsx')">Copy JSX</button>
  <button onclick="showOutput()">View Output</button>
  <button class="danger" onclick="clearSelection()">Clear</button>
</div>

<div class="grid" id="gallery"></div>
<div class="loading" id="loading" style="display:none">
  <div class="spin"></div> Loading...
</div>

<div class="output-panel" id="outputPanel">
  <h3>Selected Photos</h3>
  <div class="formats">
    <button class="active" onclick="setFormat('urls')">URLs</button>
    <button onclick="setFormat('json')">JSON Array</button>
    <button onclick="setFormat('jsx')">JSX/TSX</button>
    <button onclick="setFormat('markdown')">Markdown</button>
  </div>
  <pre id="outputCode"></pre>
  <button onclick="copyToClipboard()" style="margin-top:8px;background:var(--green);border:none;color:white;padding:6px 16px;cursor:pointer;font-family:inherit;font-size:11px;font-weight:600;">
    COPY TO CLIPBOARD
  </button>
</div>

<script>
// ── Config ──────────────────────────────────────────────────
const SUPABASE_URL = 'https://tednluwflfhxyucgwigh.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlZG5sdXdmbGZoeHl1Y2d3aWdoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTIzNDYyMjksImV4cCI6MjA2NzkyMjIyOX0.PG0iGZQR2d8yo4y3q1e2tEIMa3J0AdFkI1Q6P7IDgrg';

const PUBLIC_BUCKETS = [
  'media', 'images', 'photos', 'videos', 'profile-images',
  'avatars', 'portraits', 'photo-wall', 'story-images',
  'storyteller-media', 'storyteller-photos', 'empathy-ledger-media',
  'media-uploads', 'audio'
];

const IMAGE_EXTS = new Set(['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg', 'avif']);

// ── State ───────────────────────────────────────────────────
let currentBucket = 'media';
let currentPath = '';
let selected = new Map(); // url -> {name, bucket, path}
let currentFormat = 'urls';
let allItems = [];
let viewMode = 'grid';
let gridSize = 200;

// ── API ─────────────────────────────────────────────────────
async function listObjects(bucket, prefix = '', limit = 500) {
  const res = await fetch(`${SUPABASE_URL}/storage/v1/object/list/${bucket}`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({ prefix, limit, sortBy: { column: 'name', order: 'asc' } }),
  });
  if (!res.ok) return [];
  return res.json();
}

function getPublicUrl(bucket, path) {
  return `${SUPABASE_URL}/storage/v1/object/public/${bucket}/${path}`;
}

function isImage(name) {
  const ext = name.split('.').pop()?.toLowerCase() || '';
  return IMAGE_EXTS.has(ext);
}

function formatSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + 'B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + 'KB';
  return (bytes / (1024 * 1024)).toFixed(1) + 'MB';
}

// ── Render ──────────────────────────────────────────────────
async function navigate(bucket, path = '') {
  currentBucket = bucket;
  currentPath = path;

  document.getElementById('loading').style.display = 'flex';
  document.getElementById('gallery').innerHTML = '';

  const items = await listObjects(bucket, path);
  allItems = items;

  document.getElementById('loading').style.display = 'none';
  renderBreadcrumb();
  renderGallery(items);
}

function renderBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  const parts = currentPath ? currentPath.split('/').filter(Boolean) : [];

  let html = `<button onclick="navigate('${currentBucket}')">🗂 ${currentBucket}</button>`;
  let accum = '';
  for (const part of parts) {
    accum += part + '/';
    html += `<span class="sep">/</span><button onclick="navigate('${currentBucket}','${accum}')">${part}</button>`;
  }
  bc.innerHTML = html;
}

function renderGallery(items) {
  const gallery = document.getElementById('gallery');
  const search = document.getElementById('searchInput').value.toLowerCase();

  gallery.className = viewMode === 'list' ? 'grid list' : 'grid';
  gallery.style.gridTemplateColumns = viewMode === 'list'
    ? '1fr'
    : `repeat(auto-fill, minmax(${gridSize}px, 1fr))`;

  // Separate folders and files
  const folders = items.filter(i => !i.metadata && i.name !== '.emptyFolderPlaceholder');
  const files = items.filter(i => i.metadata && isImage(i.name));
  const filtered = search
    ? files.filter(f => f.name.toLowerCase().includes(search))
    : files;

  let html = '';

  // Folders first
  for (const folder of folders) {
    html += `
      <div class="card folder" onclick="navigate('${currentBucket}', '${currentPath}${folder.name}/')">
        <span class="folder-icon">📁</span>
        <div>
          <div class="folder-name">${folder.name}</div>
        </div>
      </div>`;
  }

  // Images
  for (const file of filtered) {
    const fullPath = currentPath + file.name;
    const url = getPublicUrl(currentBucket, fullPath);
    const isSelected = selected.has(url);
    const size = formatSize(file.metadata?.size);
    const mime = file.metadata?.mimetype || '';

    html += `
      <div class="card ${isSelected ? 'selected' : ''}"
           onclick="toggleSelect('${url}', '${file.name.replace(/'/g, "\\'")}', '${currentBucket}', '${fullPath.replace(/'/g, "\\'")}')"
           data-url="${url}">
        <img src="${url}" alt="${file.name}" loading="lazy"
             onerror="this.style.display='none'" />
        <div class="info">
          <div class="name" title="${file.name}">${file.name}</div>
          <div class="meta">${size} ${mime.split('/')[1] || ''}</div>
        </div>
      </div>`;
  }

  gallery.innerHTML = html || '<div class="loading">No images found in this folder</div>';
  updateStats(folders.length, filtered.length);
}

function updateStats(folderCount, imageCount) {
  document.getElementById('stats').textContent =
    `${folderCount} folders · ${imageCount} images · ${selected.size} selected`;
}

// ── Selection ───────────────────────────────────────────────
function toggleSelect(url, name, bucket, path) {
  if (selected.has(url)) {
    selected.delete(url);
  } else {
    selected.set(url, { name, bucket, path });
  }
  // Update card visual
  const card = document.querySelector(`.card[data-url="${CSS.escape(url)}"]`);
  if (card) card.classList.toggle('selected');

  updateSelectionBar();
  updateStats(
    allItems.filter(i => !i.metadata).length,
    allItems.filter(i => i.metadata && isImage(i.name)).length
  );
}

function clearSelection() {
  selected.clear();
  document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
  updateSelectionBar();
  document.getElementById('outputPanel').classList.remove('active');
}

function updateSelectionBar() {
  const bar = document.getElementById('selectionBar');
  const count = document.getElementById('selectionCount');
  if (selected.size > 0) {
    bar.classList.add('active');
    count.textContent = `${selected.size} selected`;
  } else {
    bar.classList.remove('active');
  }
}

// ── Output ──────────────────────────────────────────────────
function formatSelected(format) {
  const urls = [...selected.keys()];
  const entries = [...selected.entries()].map(([url, info]) => ({ url, ...info }));

  switch (format) {
    case 'urls':
      return urls.join('\n');

    case 'json':
      return JSON.stringify(entries.map(e => ({
        src: e.url,
        alt: e.name.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' '),
      })), null, 2);

    case 'jsx':
      return entries.map(e => {
        const alt = e.name.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ');
        return `<Image\n  src="${e.url}"\n  alt="${alt}"\n  fill\n  className="object-cover"\n  sizes="(max-width: 768px) 50vw, 33vw"\n/>`;
      }).join('\n\n');

    case 'markdown':
      return entries.map(e => {
        const alt = e.name.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ');
        return `![${alt}](${e.url})`;
      }).join('\n\n');

    default:
      return urls.join('\n');
  }
}

function copySelected(format) {
  const text = formatSelected(format || currentFormat);
  navigator.clipboard.writeText(text).then(() => {
    const bar = document.getElementById('selectionBar');
    const orig = bar.style.background;
    bar.style.background = '#065f46';
    setTimeout(() => bar.style.background = orig, 600);
  });
}

function showOutput() {
  const panel = document.getElementById('outputPanel');
  panel.classList.toggle('active');
  renderOutput();
}

function setFormat(fmt) {
  currentFormat = fmt;
  document.querySelectorAll('.formats button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderOutput();
}

function renderOutput() {
  document.getElementById('outputCode').textContent = formatSelected(currentFormat);
}

function copyToClipboard() {
  const text = document.getElementById('outputCode').textContent;
  navigator.clipboard.writeText(text);
}

// ── Init ────────────────────────────────────────────────────
function initBucketSelect() {
  const sel = document.getElementById('bucketSelect');
  for (const bucket of PUBLIC_BUCKETS) {
    const opt = document.createElement('option');
    opt.value = bucket;
    opt.textContent = bucket;
    sel.appendChild(opt);
  }
  sel.value = 'media';
  sel.addEventListener('change', () => navigate(sel.value));
}

function initViewToggle() {
  document.getElementById('gridView').addEventListener('click', () => {
    viewMode = 'grid';
    document.getElementById('gridView').classList.add('active');
    document.getElementById('listView').classList.remove('active');
    renderGallery(allItems);
  });
  document.getElementById('listView').addEventListener('click', () => {
    viewMode = 'list';
    document.getElementById('listView').classList.add('active');
    document.getElementById('gridView').classList.remove('active');
    renderGallery(allItems);
  });
}

function initSizeSelector() {
  document.querySelectorAll('.size-selector button').forEach(btn => {
    btn.addEventListener('click', () => {
      gridSize = parseInt(btn.dataset.cols);
      document.querySelectorAll('.size-selector button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGallery(allItems);
    });
  });
}

function initSearch() {
  let timer;
  document.getElementById('searchInput').addEventListener('input', () => {
    clearTimeout(timer);
    timer = setTimeout(() => renderGallery(allItems), 200);
  });
}

// Boot
initBucketSelect();
initViewToggle();
initSizeSelector();
initSearch();
navigate('media');
</script>
</body>
</html>
