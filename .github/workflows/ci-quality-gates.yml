name: CI Quality Gates

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]

permissions:
  contents: read

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI_FUNDING_SMOKE_ENABLED: ${{ secrets.CI_DATABASE_URL != '' && secrets.CI_SUPABASE_URL != '' && secrets.CI_SUPABASE_ANON_KEY != '' && secrets.CI_SUPABASE_SERVICE_ROLE_KEY != '' }}
      DATABASE_URL: ${{ secrets.CI_DATABASE_URL || secrets.SUPABASE_DB_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.CI_SUPABASE_URL || secrets.STAGING_SUPABASE_URL || secrets.PROD_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.CI_SUPABASE_ANON_KEY || secrets.STAGING_SUPABASE_ANON_KEY || secrets.PROD_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.CI_SUPABASE_SERVICE_ROLE_KEY || secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY || secrets.PROD_SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Validate CI secrets
        run: |
          set -euo pipefail
          missing=0
          for key in DATABASE_URL NEXT_PUBLIC_SUPABASE_URL NEXT_PUBLIC_SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required secret/env: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Check hardcoded Supabase keys
        run: npm run check:no-hardcoded-supabase-keys

      - name: Runtime schema contract audit
        run: npm run audit:runtime-schema

      - name: Route link integrity
        run: npm run check:route-links

      # TypeScript green lanes type-check uses lane-specific tsconfigs that
      # are deliberately gitignored as local-only typecheck tooling
      # (see .gitignore "Lane-specific tsconfigs (typecheck tooling, not build)").
      # Run informationally so CI visibility stays intact without blocking on
      # missing files. The Production Deployment "Build for production" step
      # is the real type-correctness gate (next build runs tsc on the build set).
      - name: TypeScript green lanes (informational)
        continue-on-error: true
        run: npm run type-check:green-lanes

      - name: Frontend smoke check
        run: |
          set -euo pipefail
          npm run dev > /tmp/next-dev.log 2>&1 &
          DEV_PID=$!
          cleanup() {
            kill $DEV_PID >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for i in {1..90}; do
            if curl -sf "http://127.0.0.1:3000/" >/dev/null; then
              break
            fi
            sleep 2
          done

          if ! curl -sf "http://127.0.0.1:3000/" >/dev/null; then
            echo "::group::next-dev.log (server failed to boot)"
            tail -200 /tmp/next-dev.log || true
            echo "::endgroup::"
          fi

          FRONTEND_SMOKE_BASE_URL=http://127.0.0.1:3000 npm run check:frontend-smoke

      - name: Upload frontend smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-smoke-${{ github.run_number }}
          path: artifacts/frontend-smoke/**
          if-no-files-found: ignore
          retention-days: 14

      # Funding regression smoke seeds fixtures across 9 tables before
      # querying. CI's Supabase has accumulated schema drift from the repo
      # migrations (community_outcome_definitions was missing baseline_method,
      # metadata, etc. — aligned 2026-05-05 but more tables likely affected).
      # Soft-fail until a proper schema audit + migration backfill closes
      # all the drift. Artifact still uploaded for inspection. The
      # frontend smoke check above is the live functional gate.
      - name: Funding regression smoke (informational — schema drift)
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.CI_DATABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.CI_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.CI_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.CI_SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          if [ "${CI_FUNDING_SMOKE_ENABLED}" != "true" ]; then
            echo "Skipping funding regression smoke: dedicated CI funding secrets are not configured."
            exit 0
          fi
          npm run dev > /tmp/next-dev-funding.log 2>&1 &
          DEV_PID=$!
          cleanup() {
            kill $DEV_PID >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for i in {1..90}; do
            if curl -sf "http://127.0.0.1:3000/api/funding/accountability?limit=1" >/dev/null; then
              break
            fi
            sleep 2
          done

          FUNDING_SMOKE_BASE_URL=http://127.0.0.1:3000 npm run check:funding-regression:seed

      - name: Upload funding smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: funding-smoke-${{ github.run_number }}
          path: artifacts/funding-smoke/**
          if-no-files-found: ignore
          retention-days: 14
