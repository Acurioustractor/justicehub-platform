name: Production Deployment

on:
  push:
    branches: [main]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      # Lint runs with a warnings ratchet (--max-warnings 3300 in package.json,
      # current count ~3288 once test files are included). Adding new warnings
      # fails CI; cleaning warnings is encouraged. Lower the cap as the count
      # drops. Use `lint:strict` locally for zero-warning runs.
      - name: Run linting
        run: npm run lint

      - name: Check hardcoded Supabase keys
        run: npm run check:no-hardcoded-supabase-keys
      
      - name: Build for production
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PROD_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PROD_SUPABASE_SERVICE_ROLE_KEY }}
      
      - name: Build completed successfully
        run: echo "✅ Production build ready! Connect Vercel via GitHub integration when ready."
